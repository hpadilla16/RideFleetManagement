services:
  db:
    image: postgres:16-alpine
    container_name: fleet-db
    environment:
      POSTGRES_DB: fleet_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - fleet_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: fleet-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma db push && npm run dev"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: fleet-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:4000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

volumes:
  fleet_pg_data:
