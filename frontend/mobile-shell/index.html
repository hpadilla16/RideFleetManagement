<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Ride Fleet Mobile Shell</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f6f3ff 0%, #ffffff 100%);
        color: #1f2240;
      }

      main {
        width: min(480px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(91, 67, 160, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.8rem;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.5;
      }

      a {
        color: #6a39ef;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ride Fleet Mobile</h1>
      <p>
        This native wrapper is configured to load the hosted Ride Fleet mobile
        experience.
      </p>
      <p>
        If the remote app does not load automatically, open
        <a href="https://beta.ridefleetmanager.com">beta.ridefleetmanager.com</a>.
      </p>
    </main>
  </body>
</html>
